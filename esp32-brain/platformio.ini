[env:esp32-s3-devkitc-1]

; ----------------------------------------------------------------------------
; Platform & Board
; ----------------------------------------------------------------------------
platform   = espressif32
board      = esp32-s3-devkitc-1
framework  = arduino

; ----------------------------------------------------------------------------
; Serial Monitor
; ----------------------------------------------------------------------------
; 115200 baud matches the Arduino serial link and debug output rate.
; esp32_exception_decoder translates crash backtraces into readable function names.
monitor_speed   = 115200
monitor_filters = esp32_exception_decoder

; ----------------------------------------------------------------------------
; Flash Partition Layout
; ----------------------------------------------------------------------------
; min_spiffs.csv gives maximum app space with a minimal SPIFFS partition.
; SPIFFS is not used — the dashboard is served externally (browser / BT).
; OTA update slots are preserved for future wireless firmware updates.
board_build.partitions = min_spiffs.csv

; ----------------------------------------------------------------------------
; Build Flags
; ----------------------------------------------------------------------------
build_flags =
    -DCORE_DEBUG_LEVEL=1        ; 0=None 1=Error 2=Warn 3=Info 4=Debug 5=Verbose
    -DARDUINO_USB_CDC_ON_BOOT=1 ; Required for USB-CDC serial on ESP32-S3
    -DBOARD_HAS_PSRAM           ; Enable PSRAM support (needed for AI/vision tasks)

; ----------------------------------------------------------------------------
; Library Dependencies
; ----------------------------------------------------------------------------
; WebSockets: Real-time bidirectional communication with the dashboard.
; ArduinoJson: Structured telemetry serialization / command parsing.
lib_deps =
    links2004/WebSockets @ ^2.4.1
    bblanchon/ArduinoJson @ ^6.21.3

; ----------------------------------------------------------------------------
; Upload Settings
; ----------------------------------------------------------------------------
; Default upload uses USB (auto-detected port).
; Uncomment and set upload_port if automatic detection fails.
; Windows example: upload_port = COM5
; Linux example:   upload_port = /dev/ttyUSB0
; upload_port = COM5
