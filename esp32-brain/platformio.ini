[env:esp32-s3-devkitc-1]
platform            = espressif32
board               = esp32-s3-devkitc-1
framework           = arduino
monitor_speed       = 115200
monitor_filters     = esp32_exception_decoder

; Partition: 4 MB with OTA slots (no SPIFFS — dashboard served externally)
board_build.partitions = min_spiffs.csv

build_flags =
    -DCORE_DEBUG_LEVEL=1
    -DARDUINO_USB_CDC_ON_BOOT=1    ; Enable USB-CDC serial on S3
    -DBOARD_HAS_PSRAM

lib_deps =
    links2004/WebSockets@^2.4.1
    bblanchon/ArduinoJson@^6.21.3

; Upload via USB (default) — use upload_port for specific port
; upload_port = /dev/ttyUSB0
